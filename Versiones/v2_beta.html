<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Facturación Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --tigo: #0033A0; --tigo2: #0057D9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0033A0, #0057D9); color: white; padding: 20px; }
        .container { max-width: 420px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .title { font-size: 20px; font-weight: 600; }
        .help { width: 36px; height: 36px; background: white; color: #0033A0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        .card { background: rgba(255,255,255,0.12); padding: 18px; border-radius: 16px; margin-bottom: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        label { font-size: 11px; opacity: 0.8; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; height: 48px; padding: 12px; border-radius: 12px; border: none; font-size: 14px; background: #f2f2f2; margin-bottom: 15px; outline: none; color: #333; }
        
        .botones { display: flex; gap: 10px; margin-top: 5px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 12px; background: white; color: #0033A0; font-weight: 600; font-size: 15px; cursor: pointer; }
        .btn-clear { background: rgba(255,255,255,0.2); color: white; }

        .meses { display: flex; justify-content: space-between; margin-top: 20px; font-weight: 600; opacity: 0.8; font-size: 14px; }
        
        .timeline { position: relative; height: 160px; margin-top: 10px; }
        .line { position: absolute; top: 50%; width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; }
        
        .event { position: absolute; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2; }
        .top { top: 35%; transform: translate(-50%, -50%); }
        .bottom { top: 65%; transform: translate(-50%, -50%); }
        
        .install { background: #4CC9F0; box-shadow: 0 0 10px rgba(76, 201, 240, 0.3); }
        .invoice { background: #FFD166; color: black; }
        .pay { background: #06D6A0; box-shadow: 0 0 15px rgba(6, 214, 160, 0.5); transition: none; cursor: grab; }
        .charge { background: #EF476F; }

        .label { position: absolute; font-size: 11px; width: 90px; text-align: center; transform: translateX(-50%); transition: left 0.4s ease; }
        .label.top { top: 5%; }
        .label.bottom { top: 85%; }

        .result { margin-top: 15px; font-size: 15px; line-height: 1.5; }
        .good { color: #06D6A0; font-weight: 600; }
        .warning { color: #FFD166; font-weight: 600; margin-bottom: 5px; display: block; }
        
        /* Gráfico de Barras */
        .chart-container { margin-top: 15px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; display: none; animation: fadeIn 0.4s ease; }
        .bar-group { height: 14px; display: flex; border-radius: 7px; overflow: hidden; margin: 10px 0; background: rgba(255,255,255,0.1); }
        .bar { height: 100%; transition: width 0.6s ease; }
        .legend { display: flex; justify-content: space-between; font-size: 10px; opacity: 0.8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; padding: 20px; z-index: 100; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; max-width: 500px; color: #333; }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="title">Simulador Facturación</div>
            <div class="help" onclick="abrirAyuda()">?</div>
        </div>

        <div class="card">
            <label>Fecha instalación</label>
            <input type="date" id="fecha">
            <label>Valor plan</label>
            <input type="number" id="plan" placeholder="0">
            <label>Anticipo</label>
            <input type="number" id="anticipo" placeholder="0">
            <div class="botones">
                <button onclick="simular()">Simular</button>
                <button class="btn-clear" onclick="limpiar()">Limpiar</button>
            </div>
        </div>

        <div id="meses" class="meses"></div>

        <div class="timeline">
            <div class="line"></div>
            <div id="inst" class="event install bottom"></div>
            <div id="instLabel" class="label bottom">Inst</div>
            <div id="fact" class="event invoice bottom"></div>
            <div id="factLabel" class="label bottom">Factura</div>
            <div id="pay" class="event pay top">P</div>
            <div id="payLabel" class="label top">Pago</div>
            <div id="vence" class="event charge top">V</div>
            <div id="venceLabel" class="label top">Vence</div>
            
            <div id="fact2" class="event invoice bottom" style="display:none">2</div>
            <div id="fact2Label" class="label bottom" style="display:none">Factura 2</div>
            <div id="corte" class="event install bottom" style="display:none">3</div>
            <div id="corteLabel" class="label bottom" style="display:none">Corte</div>
            <div id="vence2" class="event charge top" style="display:none">V</div>
            <div id="vence2Label" class="label top" style="display:none">Vence</div>
        </div>

        <div id="info" class="result"></div>

        <div id="chartFactura" class="chart-container">
            <span style="font-size: 12px;">Desglose Factura 2:</span>
            <div class="bar-group">
                <div id="barSaldo" class="bar" style="background: #FFD166;"></div>
                <div id="barPlan" class="bar" style="background: #4CC9F0;"></div>
                <div id="barCargo" class="bar" style="background: #EF476F;"></div>
            </div>
            <div class="legend">
                <span>● Saldo F1</span>
                <span>● Plan Siguiente</span>
                <span>● Cargo Adm.</span>
            </div>
        </div>

        <div id="detalleFacturacion" class="result"></div>
    </div>

    <div id="modalAyuda" class="modal">
        <div class="modal-content">
            <div style="text-align:right; cursor:pointer; font-weight:bold" onclick="cerrarAyuda()">Cerrar ✖</div>
            <h3 style="margin-bottom:10px">Guía de Ciclos</h3>
            <p style="font-size:14px">Mueva el botón verde (P) para simular el comportamiento del cliente frente al vencimiento.</p>
        </div>
    </div>

    <script>
        let cicloActual = 0;
        const tablaCiclos = {
            1: { vence: 15, corte: 3 },
            7: { vence: 21, corte: 9 },
            15: { vence: 1, corte: 17 },
            21: { vence: 5, corte: 4 }
        };

        function obtenerCicloAsignado(dia) {
            if (dia >= 1 && dia <= 6) return 7;
            if (dia >= 7 && dia <= 14) return 15;
            if (dia >= 15 && dia <= 20) return 21;
            if (dia >= 21 && dia <= 31) return 1;
            return 7;
        }

        function simular() {
            let fechaStr = document.getElementById("fecha").value;
            if (!fechaStr) return alert("Ingrese fecha");

            let fecha = new Date(fechaStr + 'T00:00:00');
            let dia = fecha.getDate();
            cicloActual = obtenerCicloAsignado(dia);
            
            let m1 = fecha.getFullYear() + (fecha.getMonth() + 1).toString().padStart(2, "0");
            let f2 = new Date(fecha.getFullYear(), fecha.getMonth() + 1, 1);
            let m2 = f2.getFullYear() + (f2.getMonth() + 1).toString().padStart(2, "0");
            document.getElementById("meses").innerHTML = `<span>${m1}</span><span>${m2}</span>`;

            let posInst = (dia / 60) * 100;
            let posFact = (cicloActual <= dia && cicloActual !== 1) ? ((30 + cicloActual) / 60) * 100 : (cicloActual === 1 ? 52 : (cicloActual / 60) * 100);
            let posVence = posFact + (tablaCiclos[cicloActual].vence < cicloActual ? (tablaCiclos[cicloActual].vence + (30 - cicloActual)) / 60 * 100 : (tablaCiclos[cicloActual].vence - cicloActual) / 60 * 100);

            setPos("inst", "instLabel", posInst, dia);
            setPos("fact", "factLabel", posFact, cicloActual);
            setPos("vence", "venceLabel", Math.min(posVence, 94), "V");
            setPos("pay", "payLabel", Math.min(posVence - 8, 85), "P");

            actualizarTextos(f2, tablaCiclos[cicloActual].vence);
            mostrarEstadoNormal();
        }

        function actualizarTextos(mes2Date, diaVence) {
            let fV1 = new Date(mes2Date.getFullYear(), mes2Date.getMonth(), diaVence);
            if (diaVence > 10 && cicloActual === 1) fV1.setMonth(fV1.getMonth() - 1);
            let fV2 = new Date(fV1.getFullYear(), fV1.getMonth() + 1, diaVence);

            document.getElementById("detalleFacturacion").innerHTML = `
                Ciclo asignado: <strong>${cicloActual}</strong><br>
                Vencimiento Factura 1: <strong>${fV1.toLocaleDateString()}</strong>
                <div id="venceF2Detalle" style="display:none; color:#FFD166; margin-top:5px">Vencimiento Factura 2: <strong>${fV2.toLocaleDateString()}</strong></div>
            `;
        }

        function setPos(id, label, pos, text) {
            document.getElementById(id).style.left = pos + "%";
            document.getElementById(label).style.left = pos + "%";
            document.getElementById(id).innerHTML = text;
        }

        const pago = document.getElementById("pay");
        const move = (e) => {
            let rect = document.querySelector(".timeline").getBoundingClientRect();
            let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            let pos = Math.max(0, Math.min(100, (x / rect.width) * 100));

            pago.style.left = pos + "%";
            document.getElementById("payLabel").style.left = pos + "%";

            let vPos = parseFloat(document.getElementById("vence").style.left);
            if (pos > vPos) {
                expandir();
                document.getElementById("venceF2Detalle").style.display = "block";
                document.getElementById("chartFactura").style.display = "block";
            } else {
                contraer();
                mostrarEstadoNormal();
                document.getElementById("venceF2Detalle").style.display = "none";
                document.getElementById("chartFactura").style.display = "none";
            }
        };

        pago.addEventListener("mousedown", () => document.addEventListener("mousemove", move));
        document.addEventListener("mouseup", () => document.removeEventListener("mousemove", move));
        pago.addEventListener("touchstart", () => document.addEventListener("touchmove", move));
        document.addEventListener("touchend", () => document.removeEventListener("touchmove", move));

        function expandir() {
            ["fact2", "fact2Label", "corte", "corteLabel", "vence2", "vence2Label"].forEach(id => document.getElementById(id).style.display = id.includes("Label") ? "block" : "flex");
            let vPos = parseFloat(document.getElementById("vence").style.left);
            setPos("fact2", "fact2Label", Math.min(vPos + 12, 85), cicloActual);
            setPos("corte", "corteLabel", Math.min(vPos + 18, 90), tablaCiclos[cicloActual].corte);
            setPos("vence2", "vence2Label", Math.min(vPos + 28, 98), "V");

            let p = parseFloat(document.getElementById("plan").value) || 0;
            let a = parseFloat(document.getElementById("anticipo").value) || 0;
            let s = p - a;
            let total = p + s + 12000;

            document.getElementById("info").innerHTML = `<span class="warning">⚠ No se registró pago de Factura 1</span><strong style="font-size:18px; color:#FFD166">Total Factura 2: ${total.toLocaleString()}</strong>`;
            document.getElementById("barSaldo").style.width = (s / total * 100) + "%";
            document.getElementById("barPlan").style.width = (p / total * 100) + "%";
            document.getElementById("barCargo").style.width = (12000 / total * 100) + "%";
        }

        function contraer() {
            ["fact2", "fact2Label", "corte", "corteLabel", "vence2", "vence2Label"].forEach(id => document.getElementById(id).style.display = "none");
        }

        function mostrarEstadoNormal() {
            let p = parseFloat(document.getElementById("plan").value) || 0;
            let a = parseFloat(document.getElementById("anticipo").value) || 0;
            document.getElementById("info").innerHTML = `Saldo factura 1: ${(p - a).toLocaleString()}<br><span class="good">Pago dentro del plazo ✓</span>`;
        }

        function limpiar() {
            location.reload();
        }

        function abrirAyuda() { document.getElementById("modalAyuda").style.display = "flex"; }
        function cerrarAyuda() { document.getElementById("modalAyuda").style.display = "none"; }
    </script>
</body>
</html>
