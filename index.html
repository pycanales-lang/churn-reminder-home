<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Churn Tool HOME</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--tigo:#0033A0;
--tigo2:#0057D9;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0033A0,#0057D9);
color:white;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:20px;
font-weight:600;
}

.help{
width:36px;
height:36px;
background:white;
color:#0033A0;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.12);
padding:18px;
border-radius:16px;
margin-bottom:15px;
}

.section-title{
font-size:14px;
font-weight:600;
margin-bottom:10px;
opacity:0.9;
}

.input-group{
margin-bottom:12px;
}

label{
font-size:12px;
opacity:0.8;
display:block;
margin-bottom:4px;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
font-size:14px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:white;
color:#0033A0;
font-weight:600;
font-size:15px;
cursor:pointer;
}

.result{
margin-top:15px;
}

.alert{
padding:12px;
border-radius:10px;
margin-bottom:8px;
font-weight:600;
text-align:center;
}

.low{background:#06D6A0;color:black;}
.medium{background:#FFD166;color:black;}
.high{background:#EF476F;}

.summary{
font-size:13px;
opacity:0.9;
margin-top:10px;
line-height:1.5;
}

.botones{
display:flex;
gap:10px;
margin-top:10px;
}

.botones button{
flex:1;
}

.btn-clear{
background:#d9d9d9;
color:#333;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

.modal-content{
background:white;
padding:15px;
border-radius:12px;
max-width:500px;
max-height:90%;
overflow:auto;
}

.modal-content img{
width:100%;
margin-bottom:12px;
border-radius:8px;
}

.close{
text-align:right;
font-weight:bold;
cursor:pointer;
color:black;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<div class="title">📊 Churn Tool</div>
<div class="help" onclick="abrirAyuda()">?</div>
</div>


<!-- DATOS CUENTA -->

<div class="card">

<div class="section-title">DATOS DE LA CUENTA</div>

<div class="input-group">
<label>Número de Cuenta</label>
<input type="text" id="cuenta" placeholder="Ej: 40021987">
</div>

<div class="input-group">
<label>Fecha de Instalación</label>
<input type="date" id="fechaActivacion">
</div>

<div class="input-group">
<label>Ciclo de Facturación</label>
<select id="ciclo">
<option value="1">Ciclo 1</option>
<option value="7">Ciclo 7</option>
<option value="15">Ciclo 15</option>
<option value="21">Ciclo 21</option>
</select>
</div>

</div>


<!-- PLAN -->

<div class="card">

<div class="section-title">DATOS DEL PLAN</div>

<div class="input-group">
<label>Valor del Plan (Gs)</label>
<input type="number" id="valorPlan" placeholder="Ej: 180000">
</div>

<div class="input-group">
<label>Pago Anticipo (Gs)</label>
<input type="number" id="anticipo" placeholder="Ej: 111000">
</div>

</div>


<!-- PAGOS -->

<div class="card">

<div class="section-title">PAGOS DEL CLIENTE</div>

<div class="input-group">
<label>Pagos Realizados (Gs)</label>
<input type="number" id="pagos" placeholder="Ej: 50000">
</div>

<div class="botones">

<button onclick="calcular()">CALCULAR</button>

<button class="btn-clear" onclick="limpiar()">LIMPIAR</button>

</div>

<div id="resultado" class="result"></div>

</div>

</div>


<!-- MODAL AYUDA -->

<div class="modal" id="modalAyuda">

<div class="modal-content">

<div class="close" onclick="cerrarAyuda()">Cerrar ✖</div>

<img src="imagenes/slide1.png">
<img src="imagenes/slide2.png">
<img src="imagenes/slide3.png">
<img src="imagenes/slide4.png">

</div>

</div>



<script>

function calcular(){

let valorPlan=parseFloat(document.getElementById("valorPlan").value)||0;
let anticipo=parseFloat(document.getElementById("anticipo").value)||0;
let pagos=parseFloat(document.getElementById("pagos").value)||0;

let saldo=valorPlan-anticipo-pagos;

if(saldo<0){
saldo=0;
}

let segunda=valorPlan+saldo+12000;

document.getElementById("resultado").innerHTML=

`
<div class="alert medium">
Saldo Primera Factura: Gs ${saldo.toLocaleString()}
</div>

<div class="alert high">
Si no paga → Segunda Factura: Gs ${segunda.toLocaleString()}
</div>
`;

}


function limpiar(){

document.getElementById("cuenta").value="";
document.getElementById("fechaActivacion").value="";
document.getElementById("ciclo").value="1";
document.getElementById("valorPlan").value="";
document.getElementById("anticipo").value="";
document.getElementById("pagos").value="";
document.getElementById("resultado").innerHTML="";

}


function abrirAyuda(){

document.getElementById("modalAyuda").style.display="flex";

}

function cerrarAyuda(){

document.getElementById("modalAyuda").style.display="none";

}

</script>

</body>
</html>
