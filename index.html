<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0033A0;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.timeline{

position:relative;
height:180px;
margin-top:40px;

}

.line{

position:absolute;
top:50%;
width:100%;
height:4px;
background:white;

}

.event{

position:absolute;
width:42px;
height:42px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
color:white;

}

.top{
top:20%;
transform:translate(-50%,-50%);
}

.bottom{
top:80%;
transform:translate(-50%,-50%);
}

.install{background:#4CC9F0;}
.invoice{background:#FFD166;color:black;}
.pay{background:#06D6A0;}
.charge{background:#EF476F;}

.label{

position:absolute;
font-size:12px;
width:100px;
text-align:center;

}

.label.top{
top:0%;
transform:translateX(-50%);
}

.label.bottom{
top:95%;
transform:translateX(-50%);
}

.day{
position:absolute;
top:55%;
font-size:11px;
transform:translateX(-50%);
}

</style>

</head>

<body>

<div class="container">

<h2 style="text-align:center">Simulador de Ciclo</h2>

<div class="timeline">

<div class="line"></div>

<!-- días -->

<div class="day" style="left:10%">1</div>
<div class="day" style="left:25%">7</div>
<div class="day" style="left:50%">15</div>
<div class="day" style="left:75%">21</div>
<div class="day" style="left:90%">30</div>

<!-- eventos -->

<div class="event install bottom" style="left:25%">7</div>
<div class="label bottom" style="left:25%">Instalación</div>

<div class="event invoice bottom" style="left:50%">15</div>
<div class="label bottom" style="left:50%">Emisión factura</div>

<div class="event pay top" style="left:70%">20</div>
<div class="label top" style="left:70%">Pago cliente</div>

<div class="event charge top" style="left:90%">30</div>
<div class="label top" style="left:90%">Cargo adm</div>

</div>

</div>

</body>
</html>
