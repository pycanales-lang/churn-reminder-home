<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0033A0;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.title{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.panel{

background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
margin-bottom:20px;

}

.timeline{

position:relative;
margin-top:30px;
height:120px;

}

.line{

position:absolute;
top:50%;
width:100%;
height:4px;
background:white;

}

.marker{

position:absolute;
top:55%;
transform:translateX(-50%);
font-size:12px;

}

.event{

position:absolute;
top:50%;
transform:translate(-50%,-50%);

width:38px;
height:38px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;

cursor:pointer;

}

.install{background:#06D6A0;}
.invoice{background:#FFD166;}
.pay{background:#4CC9F0;}
.charge{background:#EF476F;}

.legend{

margin-top:20px;
font-size:14px;

}

.status{

margin-top:20px;
font-size:18px;
text-align:center;

}

.good{color:#06D6A0;}
.bad{color:#EF476F;}

</style>

</head>

<body>

<div class="container">

<div class="title">

Simulador de Facturación

</div>

<div class="panel">

Arrastra el pago para simular cuándo paga el cliente.

</div>

<div class="timeline">

<div class="line"></div>

<div class="marker" style="left:5%">1</div>
<div class="marker" style="left:20%">7</div>
<div class="marker" style="left:40%">15</div>
<div class="marker" style="left:60%">21</div>
<div class="marker" style="left:85%">30</div>

<div class="event install" style="left:20%">7</div>
<div class="event invoice" style="left:40%">15</div>
<div class="event pay" id="pago" style="left:55%">P</div>
<div class="event charge" style="left:85%">C</div>

</div>

<div class="legend">

🟢 Instalación  
🟡 Emisión Factura  
🔵 Pago Cliente  
🔴 Cargo Administrativo  

</div>

<div id="estado" class="status"></div>

</div>

<script>

const pago=document.getElementById("pago");

pago.addEventListener("touchmove",move);
pago.addEventListener("mousemove",move);

function move(e){

let timeline=document.querySelector(".timeline");
let rect=timeline.getBoundingClientRect();

let x;

if(e.touches){
x=e.touches[0].clientX;
}else{
x=e.clientX;
}

let pos=(x-rect.left)/rect.width*100;

if(pos<0) pos=0;
if(pos>100) pos=100;

pago.style.left=pos+"%";

check(pos);

}

function check(pos){

let estado=document.getElementById("estado");

if(pos<70){

estado.innerHTML="Pago dentro del plazo ✔";
estado.className="status good";

}else{

estado.innerHTML="Genera cargo administrativo ⚠";
estado.className="status bad";

}

}

</script>

</body>
</html>
