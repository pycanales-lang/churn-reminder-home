<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador Ciclo HOME</title>

<style>

body{
font-family:Arial;
background:#0033A0;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.panel{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:12px;
width:100%;
border:none;
border-radius:6px;
background:white;
color:#0033A0;
font-weight:bold;
cursor:pointer;
}

.meses{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.timeline{
position:relative;
height:200px;
margin-top:20px;
}

.line{
position:absolute;
top:50%;
width:100%;
height:4px;
background:white;
}

.event{
position:absolute;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
cursor:pointer;
}

.top{
top:20%;
transform:translate(-50%,-50%);
}

.bottom{
top:80%;
transform:translate(-50%,-50%);
}

.install{background:#4CC9F0;}
.invoice{background:#FFD166;color:black;}
.pay{background:#06D6A0;}
.charge{background:#EF476F;}

.label{
position:absolute;
font-size:12px;
width:100px;
text-align:center;
}

.label.top{
top:0%;
transform:translateX(-50%);
}

.label.bottom{
top:95%;
transform:translateX(-50%);
}

.result{
margin-top:20px;
font-size:15px;
}

.good{color:#06D6A0;}
.bad{color:#EF476F;}

</style>

</head>

<body>

<div class="container">

<h2>Simulador Facturación</h2>

<div class="panel">

<label>Fecha instalación</label>
<input type="date" id="fecha">

<label>Valor plan</label>
<input type="number" id="plan" value="180000">

<label>Anticipo</label>
<input type="number" id="anticipo" value="111000">

<button onclick="simular()">Simular</button>

</div>

<div id="meses" class="meses"></div>

<div class="timeline">

<div class="line"></div>

<div class="event install bottom" id="inst"></div>
<div class="label bottom" id="instLabel">Inst</div>

<div class="event invoice bottom" id="fact"></div>
<div class="label bottom" id="factLabel">Factura</div>

<div class="event pay top" id="pay">P</div>
<div class="label top">Pago</div>

<div class="event charge top" id="charge">C</div>
<div class="label top">Cargo</div>

</div>

<div class="result" id="info"></div>

</div>

<script>

function simular(){

let fechaInput=document.getElementById("fecha").value;

if(!fechaInput){
alert("Ingrese fecha instalación");
return;
}

let fecha=new Date(fechaInput);

let dia=fecha.getDate();

let ciclos=[1,7,15,21];

let ciclo=ciclos.find(c=>c>dia);

let mesFactura=fecha.getMonth();

if(!ciclo){
ciclo=1;
mesFactura=mesFactura+1;
}

let mesActual=fecha.toLocaleString("es-ES",{month:"long"});
let mesSig=new Date(fecha.getFullYear(),fecha.getMonth()+1)
.toLocaleString("es-ES",{month:"long"});

document.getElementById("meses").innerHTML=

`
<span>${mesActual}</span>
<span>${mesSig}</span>
`

let posInst=(dia/31)*100;
let posFact=(ciclo/31)*100;

document.getElementById("inst").style.left=posInst+"%";
document.getElementById("fact").style.left=posFact+"%";

document.getElementById("instLabel").style.left=posInst+"%";
document.getElementById("factLabel").style.left=posFact+"%";

document.getElementById("inst").innerHTML=dia;
document.getElementById("fact").innerHTML=ciclo;

let posPay=posFact+10;
let posCharge=posFact+20;

document.getElementById("pay").style.left=posPay+"%";
document.getElementById("charge").style.left=posCharge+"%";

let plan=parseFloat(document.getElementById("plan").value)||0;
let anticipo=parseFloat(document.getElementById("anticipo").value)||0;

let saldo=plan-anticipo;

document.getElementById("info").innerHTML=

`
Ciclo asignado: ${ciclo}<br>
Prorrateo exonerado: ${dia} → ${ciclo}<br><br>

Saldo primera factura: ${saldo.toLocaleString()}
`;

}

const pago=document.getElementById("pay");

pago.addEventListener("touchmove",move);
pago.addEventListener("mousemove",move);

function move(e){

let timeline=document.querySelector(".timeline");
let rect=timeline.getBoundingClientRect();

let x;

if(e.touches){
x=e.touches[0].clientX;
}else{
x=e.clientX;
}

let pos=(x-rect.left)/rect.width*100;

if(pos<0) pos=0;
if(pos>100) pos=100;

pago.style.left=pos+"%";

check(pos);

}

function check(pos){

let info=document.getElementById("info");

if(pos<75){

info.innerHTML=
info.innerHTML.split("<span")[0] +
"<br><span class='good'>Pago dentro del plazo</span>";

}else{

info.innerHTML=
info.innerHTML.split("<span")[0] +
"<br><span class='bad'>Genera cargo administrativo</span>";

}

}

</script>

</body>
</html>
