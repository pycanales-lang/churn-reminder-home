<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador Facturación</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--tigo:#0033A0;
--tigo2:#0057D9;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0033A0,#0057D9);
color:white;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:20px;
font-weight:600;
}

.help{
width:36px;
height:36px;
background:white;
color:#0033A0;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.12);
padding:18px;
border-radius:16px;
margin-bottom:15px;
}

label{
font-size:12px;
opacity:0.85;
display:block;
margin-bottom:5px;
}

input{
width:100%;
height:48px;
padding:12px;
border-radius:12px;
border:none;
font-size:14px;
background:#f2f2f2;
}

.botones{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
background:white;
color:#0033A0;
font-weight:600;
font-size:15px;
cursor:pointer;
}

.btn-clear{
background:#d9d9d9;
color:#333;
}

.meses{
display:flex;
justify-content:space-between;
margin-top:10px;
font-weight:600;
}

.timeline{
position:relative;
height:160px;
margin-top:20px;
}

.line{
position:absolute;
top:50%;
width:100%;
height:4px;
background:white;
}

.event{
position:absolute;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.top{
top:35%;
transform:translate(-50%,-50%);
}

.bottom{
top:65%;
transform:translate(-50%,-50%);
}

.install{background:#4CC9F0;}
.invoice{background:#FFD166;color:black;}
.pay{background:#06D6A0;}
.charge{background:#EF476F;}

.label{
position:absolute;
font-size:12px;
width:90px;
text-align:center;
transform:translateX(-50%);
}

.label.top{ top:10%; }
.label.bottom{ top:80%; }

.result{
margin-top:20px;
font-size:15px;
}

.good{color:#06D6A0;}
.bad{color:#EF476F;}

.warning{
color:#FFD166;
font-weight:600;
margin-top:10px;
}

/* modal ayuda */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

.modal-content{
background:white;
padding:15px;
border-radius:12px;
max-width:500px;
max-height:90%;
overflow:auto;
}

.modal-content img{
width:100%;
margin-bottom:12px;
border-radius:8px;
}

.close{
text-align:right;
font-weight:bold;
cursor:pointer;
color:black;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<div class="title">Simulador Facturación</div>
<div class="help" onclick="abrirAyuda()">?</div>
</div>

<div class="card">

<label>Fecha instalación</label>
<input type="date" id="fecha">

<label>Valor plan</label>
<input type="number" id="plan" placeholder="0">

<label>Anticipo</label>
<input type="number" id="anticipo" placeholder="0">

<div class="botones">
<button onclick="simular()">Simular</button>
<button class="btn-clear" onclick="limpiar()">Limpiar</button>
</div>

</div>

<div id="meses" class="meses"></div>

<div class="timeline">

<div class="line"></div>

<div class="event install bottom" id="inst"></div>
<div class="label bottom" id="instLabel">Inst</div>

<div class="event invoice bottom" id="fact"></div>
<div class="label bottom" id="factLabel">Factura</div>

<div class="event pay top" id="pay">P</div>
<div class="label top" id="payLabel">Pago</div>

<div class="event charge top" id="vence">V</div>
<div class="label top" id="venceLabel">Vence</div>

<div class="event invoice bottom" id="fact2" style="display:none">2</div>
<div class="label bottom" id="fact2Label" style="display:none">Factura2</div>

<div class="event install bottom" id="corte" style="display:none">3</div>
<div class="label bottom" id="corteLabel" style="display:none">Corte</div>

<div class="event charge top" id="vence2" style="display:none">V</div>
<div class="label top" id="vence2Label" style="display:none">Vence</div>

</div>

<div id="info" class="result"></div>
<div id="detalleFacturacion" class="result"></div>

</div>

<!-- MODAL AYUDA -->

<div class="modal" id="modalAyuda">

<div class="modal-content">

<div class="close" onclick="cerrarAyuda()">Cerrar ✖</div>

<img src="Imagenes/Diapositiva2.PNG">
<img src="Imagenes/Diapositiva3.PNG">
<img src="Imagenes/Diapositiva4.PNG">
<img src="Imagenes/Diapositiva5.PNG">
<img src="Imagenes/Diapositiva6.PNG">
<img src="Imagenes/Diapositiva7.PNG">

</div>

</div>

<script>

let saldoActual=0
let cicloActual=0

function formatoPeriodo(fecha){
let year=fecha.getFullYear()
let mes=(fecha.getMonth()+1).toString().padStart(2,"0")
return year+mes
}

function calcularVencimiento(ciclo,fecha){

let year=fecha.getFullYear()
let mes=fecha.getMonth()

let vencimiento

if(ciclo==1) vencimiento=15
if(ciclo==7) vencimiento=21
if(ciclo==15) vencimiento=30
if(ciclo==21) vencimiento=4

return new Date(year,mes+1,vencimiento)

}

/* NUEVA FUNCION CORTE SEGUN PPT */

function calcularCorte(ciclo){

if(ciclo==1) return 3
if(ciclo==7) return 3
if(ciclo==15) return 4
if(ciclo==21) return 4

}

function simular(){

let fecha=new Date(document.getElementById("fecha").value)

if(!fecha){
alert("Ingrese fecha instalación")
return
}

let dia=fecha.getDate()

let ciclos=[1,7,15,21]

let ciclo=ciclos.find(c=>c>dia) || 1

cicloActual=ciclo

let mes1=formatoPeriodo(fecha)
let mes2=formatoPeriodo(new Date(fecha.getFullYear(),fecha.getMonth()+1))

meses.innerHTML=`<span>${mes1}</span><span>${mes2}</span>`

/* POSICION REAL POR DIA */

let posInst=(dia/31)*100
let posFact=(ciclo/31)*100

let posPay=45
let posVence=60

setPos("inst","instLabel",posInst,dia)
setPos("fact","factLabel",posFact,ciclo)
setPos("pay","payLabel",posPay,"P")
setPos("vence","venceLabel",posVence,"V")

mostrarEstadoNormal()

}

function setPos(id,label,pos,text){
document.getElementById(id).style.left=pos+"%"
document.getElementById(label).style.left=pos+"%"
document.getElementById(id).innerHTML=text
}

const pago=document.getElementById("pay")

pago.addEventListener("touchmove",move)
pago.addEventListener("mousemove",move)

function move(e){

let timeline=document.querySelector(".timeline")
let rect=timeline.getBoundingClientRect()

let x=e.touches?e.touches[0].clientX:e.clientX

let pos=(x-rect.left)/rect.width*100

if(pos<0)pos=0
if(pos>100)pos=100

pago.style.left=pos+"%"
payLabel.style.left=pos+"%"

let vence=parseFloat(document.getElementById("vence").style.left)

if(pos>vence){

expandir()

}else{

contraer()
mostrarEstadoNormal()

}

}

function expandir(){

fact2.style.display="flex"
fact2Label.style.display="block"
corte.style.display="flex"
corteLabel.style.display="block"
vence2.style.display="flex"
vence2Label.style.display="block"

/* POSICION REAL FACTURA2 Y CORTE */

let factura2=cicloActual
let corteDia=calcularCorte(cicloActual)

let posFact2=(factura2/31)*100

/* corte pertenece al siguiente ciclo */

let posCorte=((31 + corteDia) / 62) * 100

setPos("fact2","fact2Label",posFact2,factura2)
setPos("corte","corteLabel",posCorte,corteDia)
setPos("vence2","vence2Label",95,"V")

let fecha=new Date(document.getElementById("fecha").value)

let mes1=formatoPeriodo(fecha)
let mes2=formatoPeriodo(new Date(fecha.getFullYear(),fecha.getMonth()+1))
let mes3=formatoPeriodo(new Date(fecha.getFullYear(),fecha.getMonth()+2))

meses.innerHTML=`<span>${mes1}</span><span>${mes2}</span><span>${mes3}</span>`

let plan=parseFloat(document.getElementById("plan").value)||0
let anticipo=parseFloat(document.getElementById("anticipo").value)||0

saldoActual=plan-anticipo

let total=plan+saldoActual+12000

info.innerHTML=`<div class="warning">
⚠ Cliente no pagó la primera factura
</div>

Saldo factura 1: ${saldoActual.toLocaleString()}<br>
Plan siguiente factura: ${plan.toLocaleString()}<br>
Cargo administrativo: 12.000<br><br>

<strong style="font-size:20px;color:#FFD166">
Total Factura 2: ${total.toLocaleString()}
</strong>`

let venc1=calcularVencimiento(cicloActual,fecha)

let venc2=new Date(venc1)
venc2.setMonth(venc2.getMonth()+1)

detalleFacturacion.innerHTML=`
Ciclo asignado: <strong>${cicloActual}</strong><br>
Vencimiento Factura 1: <strong>${venc1.toLocaleDateString()}</strong><br>
Vencimiento Factura 2: <strong>${venc2.toLocaleDateString()}</strong>
`

}

function contraer(){

fact2.style.display="none"
fact2Label.style.display="none"
corte.style.display="none"
corteLabel.style.display="none"
vence2.style.display="none"
vence2Label.style.display="none"

let fecha=new Date(document.getElementById("fecha").value)

let mes1=formatoPeriodo(fecha)
let mes2=formatoPeriodo(new Date(fecha.getFullYear(),fecha.getMonth()+1))

meses.innerHTML=`<span>${mes1}</span><span>${mes2}</span>`

}

function mostrarEstadoNormal(){

let plan=parseFloat(document.getElementById("plan").value)||0
let anticipo=parseFloat(document.getElementById("anticipo").value)||0

saldoActual=plan-anticipo

info.innerHTML=
`Saldo primera factura: ${saldoActual.toLocaleString()}<br>
<span class="good">Pago dentro del plazo</span>`

let fecha=new Date(document.getElementById("fecha").value)

let venc1=calcularVencimiento(cicloActual,fecha)

detalleFacturacion.innerHTML=`
Ciclo asignado: <strong>${cicloActual}</strong><br>
Vencimiento Factura 1: <strong>${venc1.toLocaleDateString()}</strong>
`

}

function limpiar(){

document.getElementById("fecha").value=""
document.getElementById("plan").value=""
document.getElementById("anticipo").value=""

meses.innerHTML=""
info.innerHTML=""
detalleFacturacion.innerHTML=""

fact2.style.display="none"
fact2Label.style.display="none"
corte.style.display="none"
corteLabel.style.display="none"
vence2.style.display="none"
vence2Label.style.display="none"

}

function abrirAyuda(){
document.getElementById("modalAyuda").style.display="flex"
}

function cerrarAyuda(){
document.getElementById("modalAyuda").style.display="none"
}

</script>

</body>
</html>
