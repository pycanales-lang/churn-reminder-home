<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador Facturación</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--tigo:#0033A0;
--tigo2:#0057D9;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0033A0,#0057D9);
color:white;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:20px;
font-weight:600;
}

.help{
width:36px;
height:36px;
background:white;
color:#0033A0;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.12);
padding:18px;
border-radius:16px;
margin-bottom:15px;
}

label{
font-size:12px;
opacity:0.85;
display:block;
margin-bottom:5px;
}

input{
width:100%;
height:48px;
padding:12px;
border-radius:12px;
border:none;
font-size:14px;
background:#f2f2f2;
}

.botones{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
background:white;
color:#0033A0;
font-weight:600;
font-size:15px;
cursor:pointer;
}

.btn-clear{
background:#d9d9d9;
color:#333;
}

.meses{
display:flex;
justify-content:space-between;
margin-top:10px;
font-weight:600;
}

.timeline{
position:relative;
height:180px;
margin-top:20px;
}

.line{
position:absolute;
top:50%;
width:100%;
height:4px;
background:white;
}

.pin{
position:absolute;
transform:translateX(-50%);
display:flex;
flex-direction:column;
align-items:center;
}

.pin-circle{
width:36px;
height:36px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.pin-arrow{
width:0;
height:0;
border-left:7px solid transparent;
border-right:7px solid transparent;
border-top:10px solid white;
margin-top:-2px;
}

.install .pin-circle{background:#4CC9F0;}
.invoice .pin-circle{background:#FFD166;color:black;}
.pay .pin-circle{background:#06D6A0;}
.charge .pin-circle{background:#EF476F;}

.label{
margin-top:4px;
font-size:12px;
text-align:center;
}

.result{
margin-top:20px;
font-size:15px;
}

.good{color:#06D6A0;}
.bad{color:#EF476F;}

.warning{
color:#FFD166;
font-weight:600;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<div class="title">Simulador Facturación</div>
<div class="help">?</div>
</div>

<div class="card">

<label>Fecha instalación</label>
<input type="date" id="fecha">

<label>Valor plan</label>
<input type="number" id="plan" placeholder="0">

<label>Anticipo</label>
<input type="number" id="anticipo" placeholder="0">

<div class="botones">
<button onclick="simular()">Simular</button>
<button class="btn-clear" onclick="limpiar()">Limpiar</button>
</div>

</div>

<div id="meses" class="meses"></div>

<div class="timeline">

<div class="line"></div>

<div class="pin install" id="inst">
<div class="pin-circle"></div>
<div class="pin-arrow"></div>
<div class="label">Inst</div>
</div>

<div class="pin invoice" id="fact">
<div class="pin-circle"></div>
<div class="pin-arrow"></div>
<div class="label">Factura</div>
</div>

<div class="pin pay" id="pay">
<div class="pin-circle">P</div>
<div class="pin-arrow"></div>
<div class="label">Pago</div>
</div>

<div class="pin charge" id="vence">
<div class="pin-circle">V</div>
<div class="pin-arrow"></div>
<div class="label">Vence</div>
</div>

<div class="pin invoice" id="fact2" style="display:none">
<div class="pin-circle">2</div>
<div class="pin-arrow"></div>
<div class="label">Factura2</div>
</div>

<div class="pin install" id="corte" style="display:none">
<div class="pin-circle">3</div>
<div class="pin-arrow"></div>
<div class="label">Corte</div>
</div>

<div class="pin charge" id="vence2" style="display:none">
<div class="pin-circle">V</div>
<div class="pin-arrow"></div>
<div class="label">Vence</div>
</div>

</div>

<div id="info" class="result"></div>

</div>

<script>

let saldoActual=0;

function simular(){

let fecha=new Date(document.getElementById("fecha").value);

if(!fecha){
alert("Ingrese fecha instalación");
return;
}

let dia=fecha.getDate();

let ciclos=[1,7,15,21];

let ciclo=ciclos.find(c=>c>dia) || 1;

let mes1=fecha.toLocaleDateString("es-ES",{month:"long",year:"numeric"});
let mes2=new Date(fecha.getFullYear(),fecha.getMonth()+1)
.toLocaleDateString("es-ES",{month:"long",year:"numeric"});

document.getElementById("meses").innerHTML=
`<span>${mes1}</span><span>${mes2}</span>`;

let posInst=(dia/31)*100;
let posFact=(ciclo/31)*100;

if(posFact<=posInst) posFact=posInst+5;

let posPay=posFact+8;
let posVence=posPay+8;

setPos("inst",posInst);
setPos("fact",posFact);
setPos("pay",posPay);
setPos("vence",posVence);

let plan=parseFloat(planInput.value)||0;
let anticipo=parseFloat(anticipoInput.value)||0;

saldoActual=plan-anticipo;

info.innerHTML=
`Saldo primera factura: ${saldoActual.toLocaleString()}<br>
<span class="good">Pago dentro del plazo</span>`;

}

function setPos(id,pos){
document.getElementById(id).style.left=pos+"%";
}

const pago=document.getElementById("pay");

pago.addEventListener("touchmove",move);
pago.addEventListener("mousemove",move);

function move(e){

let timeline=document.querySelector(".timeline");
let rect=timeline.getBoundingClientRect();

let x=e.touches?e.touches[0].clientX:e.clientX;

let pos=(x-rect.left)/rect.width*100;

if(pos<0)pos=0;
if(pos>100)pos=100;

pago.style.left=pos+"%";

let vence=parseFloat(document.getElementById("vence").style.left);

if(pos>vence){

expandirTimeline();

}else{

info.innerHTML=
`Saldo primera factura: ${saldoActual.toLocaleString()}<br>
<span class="good">Pago dentro del plazo</span>`;

}

}

function expandirTimeline(){

fact2.style.display="flex";
corte.style.display="flex";
vence2.style.display="flex";

setPos("fact2",65);
setPos("corte",72);
setPos("vence2",90);

let fecha=new Date(fechaInput.value);

let mes1=fecha.toLocaleDateString("es-ES",{month:"long",year:"numeric"});
let mes2=new Date(fecha.getFullYear(),fecha.getMonth()+1)
.toLocaleDateString("es-ES",{month:"long",year:"numeric"});
let mes3=new Date(fecha.getFullYear(),fecha.getMonth()+2)
.toLocaleDateString("es-ES",{month:"long",year:"numeric"});

meses.innerHTML=
`<span>${mes1}</span><span>${mes2}</span><span>${mes3}</span>`;

let plan=parseFloat(planInput.value)||0;

let total=plan+saldoActual+12000;

info.innerHTML=

`
<div class="warning">
⚠ Cliente no pagó la primera factura
</div>

Saldo factura 1: ${saldoActual.toLocaleString()}<br>
Plan siguiente factura: ${plan.toLocaleString()}<br>
Cargo administrativo: 12.000<br><br>

<strong style="font-size:20px;color:#FFD166">
Total Factura 2: ${total.toLocaleString()}
</strong>
`;

}

function limpiar(){

fechaInput.value="";
planInput.value="";
anticipoInput.value="";
meses.innerHTML="";
info.innerHTML="";

fact2.style.display="none";
corte.style.display="none";
vence2.style.display="none";

}

</script>

</body>
</html>
