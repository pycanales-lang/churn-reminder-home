<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn Reminder - HOME 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    margin:0;
    padding:20px;
}
.container{
    max-width:1200px;
    margin:auto;
}
.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}
h1{
    text-align:center;
    font-weight:700;
}
select,input,button{
    padding:10px;
    border:none;
    border-radius:8px;
    margin-top:10px;
}
button{
    background:#00c6ff;
    color:white;
    font-weight:600;
    cursor:pointer;
}
.alert{
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}
.success{background:#00b894;}
.warning{background:#fdcb6e;color:black;}
.danger{background:#d63031;}
table{
    width:100%;
    margin-top:15px;
    border-collapse:collapse;
}
th,td{
    padding:10px;
    text-align:center;
}
th{
    background:#0984e3;
}
.risk-high{color:#ff7675;font-weight:700;}
.risk-medium{color:#fdcb6e;font-weight:600;}
.risk-low{color:#55efc4;font-weight:600;}
</style>
</head>
<body>

<div class="container">
<h1>📉 Churn Reminder - HOME 2026</h1>

<div class="card">
<h2>Simulador de Facturación</h2>

<label>Ciclo:</label>
<select id="ciclo">
<option value="1">Ciclo 1</option>
<option value="7">Ciclo 7</option>
<option value="15">Ciclo 15</option>
<option value="21">Ciclo 21</option>
</select>

<br>

<label>Valor Plan (Gs):</label>
<input type="number" id="valorPlan" value="180000">

<br>

<label>Anticipo (Gs):</label>
<input type="number" id="anticipo" value="111000">

<br>

<button onclick="calcular()">Calcular Riesgo</button>

<div id="resultado"></div>

</div>

<div class="card">
<h2>📋 Cuentas en Riesgo</h2>

<table>
<thead>
<tr>
<th>Cuenta</th>
<th>Ciclo</th>
<th>Días Mora</th>
<th>Riesgo</th>
</tr>
</thead>
<tbody id="tablaRiesgo">
<tr>
<td>40021987</td>
<td>15</td>
<td>5</td>
<td class="risk-medium">MEDIO</td>
</tr>
<tr>
<td>40022991</td>
<td>7</td>
<td>12</td>
<td class="risk-high">ALTO</td>
</tr>
<tr>
<td>40011982</td>
<td>1</td>
<td>0</td>
<td class="risk-low">BAJO</td>
</tr>
</tbody>
</table>
</div>

</div>

<script>
function calcular(){

let valorPlan = parseFloat(document.getElementById("valorPlan").value);
let anticipo = parseFloat(document.getElementById("anticipo").value);

let saldo = valorPlan - anticipo;
let segundaFactura = valorPlan + saldo + 12000;

let resultadoDiv = document.getElementById("resultado");

let html = `
<div class="alert warning">
Saldo Primera Factura: Gs ${saldo.toLocaleString()}
</div>

<div class="alert danger">
Si no paga → Segunda Factura: Gs ${segundaFactura.toLocaleString()}
(Incluye cargo administrativo 12.000)
</div>
`;

resultadoDiv.innerHTML = html;
}
</script>

</body>
</html>
