<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Poppins;
background:#0033A0;
color:white;
padding:20px;
}

.container{
max-width:450px;
margin:auto;
}

.title{
text-align:center;
font-size:22px;
font-weight:600;
margin-bottom:20px;
}

.panel{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:8px;
}

.timeline{
position:relative;
height:120px;
margin-top:40px;
}

.line{
position:absolute;
top:50%;
width:100%;
height:4px;
background:white;
}

.day{
position:absolute;
top:60%;
font-size:11px;
transform:translateX(-50%);
}

.event{
position:absolute;
top:50%;
transform:translate(-50%,-50%);
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.install{background:#06D6A0;}
.invoice{background:#FFD166;}
.pay{background:#4CC9F0;}
.charge{background:#EF476F;}

.status{
margin-top:25px;
text-align:center;
font-size:18px;
font-weight:600;
}

.good{color:#06D6A0;}
.bad{color:#EF476F;}

</style>

</head>

<body>

<div class="container">

<div class="title">

Simulador Ciclo HOME

</div>

<div class="panel">

<label>Fecha instalación</label>

<input type="date" id="fecha">

<button onclick="simular()">Simular</button>

</div>

<div class="timeline">

<div class="line"></div>

<div class="day" style="left:5%">1</div>
<div class="day" style="left:25%">7</div>
<div class="day" style="left:50%">15</div>
<div class="day" style="left:75%">21</div>
<div class="day" style="left:95%">30</div>

<div class="event install" id="inst"></div>
<div class="event invoice" id="fact"></div>
<div class="event pay" id="pay"></div>
<div class="event charge" id="charge"></div>

</div>

<div id="estado" class="status"></div>

</div>

<script>

function simular(){

let fecha=document.getElementById("fecha").value;

if(!fecha){
alert("Ingrese fecha instalación");
return;
}

let dia=parseInt(fecha.split("-")[2]);

let ciclos=[1,7,15,21];

let ciclo=ciclos.find(c=>c>dia);

if(!ciclo){
ciclo=1;
}

let posInst=dia/31*100;
let posFact=ciclo/31*100;

document.getElementById("inst").style.left=posInst+"%";
document.getElementById("fact").style.left=posFact+"%";

document.getElementById("inst").innerHTML=dia;
document.getElementById("fact").innerHTML=ciclo;

document.getElementById("pay").style.left=(posFact+10)+"%";
document.getElementById("charge").style.left=(posFact+20)+"%";

}

</script>

</body>
</html>
