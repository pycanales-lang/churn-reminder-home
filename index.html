<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador Ciclo</title>

<style>

body{
font-family:Arial;
background:#0033A0;
color:white;
padding:20px;
}

h2{
text-align:center;
}

.panel{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.timeline{
position:relative;
height:140px;
margin-top:30px;
}

.line{
position:absolute;
top:50%;
left:0;
width:100%;
height:4px;
background:white;
}

.day{
position:absolute;
top:60%;
font-size:11px;
transform:translateX(-50%);
}

.event{
position:absolute;
top:50%;
transform:translate(-50%,-50%);
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
}

.install{background:#06D6A0;}
.invoice{background:#FFD166;}
.pay{background:#4CC9F0;}
.charge{background:#EF476F;}

.label{
position:absolute;
top:25%;
transform:translateX(-50%);
font-size:12px;
}

.status{
text-align:center;
margin-top:25px;
font-size:18px;
font-weight:bold;
}

.good{color:#06D6A0;}
.bad{color:#EF476F;}

button{

width:100%;
margin-top:25px;
padding:14px;

border:none;
border-radius:10px;

font-size:16px;
font-weight:bold;

background:white;
color:#0033A0;

}

</style>

</head>

<body>

<h2>Simulador de Ciclo</h2>

<div class="panel">

<p>Mueve el pago para simular cuándo paga el cliente</p>

</div>

<div class="timeline">

<div class="line"></div>

<!-- días -->

<div class="day" style="left:10%">1</div>
<div class="day" style="left:25%">7</div>
<div class="day" style="left:40%">15</div>
<div class="day" style="left:55%">21</div>
<div class="day" style="left:75%">25</div>
<div class="day" style="left:90%">30</div>

<!-- eventos -->

<div class="event install" style="left:10%"></div>
<div class="label" style="left:10%">Instalación</div>

<div class="event invoice" style="left:40%"></div>
<div class="label" style="left:40%">Factura</div>

<div class="event pay" id="pago" style="left:55%"></div>
<div class="label" style="left:55%">Pago</div>

<div class="event charge" style="left:85%"></div>
<div class="label" style="left:85%">Cargo Adm</div>

</div>

<div id="estado" class="status"></div>

<button onclick="irCalculadora()">

📊 Ir a Calculadora

</button>

<script>

const pago=document.getElementById("pago");

pago.addEventListener("touchmove",move);
pago.addEventListener("mousemove",move);

function move(e){

let timeline=document.querySelector(".timeline");
let rect=timeline.getBoundingClientRect();

let x;

if(e.touches){
x=e.touches[0].clientX;
}else{
x=e.clientX;
}

let pos=(x-rect.left)/rect.width*100;

if(pos<0) pos=0;
if(pos>100) pos=100;

pago.style.left=pos+"%";

checkStatus(pos);

}

function checkStatus(pos){

let estado=document.getElementById("estado");

if(pos<75){

estado.innerHTML="Pago a tiempo ✔";
estado.className="status good";

}else{

estado.innerHTML="Genera cargo administrativo ⚠";
estado.className="status bad";

}

}

function irCalculadora(){

alert("Aquí conectaremos con la calculadora de deuda.");

}

</script>

</body>
</html>
