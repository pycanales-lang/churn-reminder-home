<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador Facturación</title>

<style>

body{
font-family:Arial;
background:#0d3b9f;
color:white;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.help{
width:32px;
height:32px;
border-radius:50%;
background:white;
color:#0d3b9f;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
}

.panel{
background:#214ea8;
padding:20px;
border-radius:14px;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:6px;
font-weight:bold;
cursor:pointer;
}

.simular{
background:white;
color:#0d3b9f;
}

.limpiar{
background:#dcdcdc;
color:black;
}

.timeline{
position:relative;
height:170px;
margin-top:30px;
}

.line{
position:absolute;
top:50%;
width:100%;
height:4px;
background:white;
}

.event{
position:absolute;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
}

.top{
top:40%;
transform:translate(-50%,-50%);
}

.bottom{
top:60%;
transform:translate(-50%,-50%);
}

.install{background:#4cc9f0;}
.invoice{background:#ffd166;color:black;}
.pay{background:#06d6a0;}
.charge{background:#ef476f;}

.label{
position:absolute;
font-size:12px;
width:90px;
text-align:center;
transform:translateX(-50%);
}

.label.top{ top:15%; }
.label.bottom{ top:75%; }

.result{
margin-top:20px;
font-size:16px;
}

.good{color:#06d6a0;}
.bad{color:#ff4d4d;}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

.modal-content{
background:white;
max-width:600px;
max-height:90%;
overflow:auto;
border-radius:10px;
padding:10px;
}

.modal img{
width:100%;
margin-bottom:10px;
}

.close{
color:black;
font-weight:bold;
cursor:pointer;
text-align:right;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>Simulador Facturación</h2>
<div class="help" onclick="abrirAyuda()">?</div>
</div>

<div class="panel">

<label>Fecha instalación</label>
<input type="date" id="fecha">

<label>Valor plan</label>
<input type="number" id="plan" value="180000">

<label>Anticipo</label>
<input type="number" id="anticipo" value="111000">

<button class="simular" onclick="simular()">Simular</button>
<button class="limpiar" onclick="limpiar()">Limpiar</button>

</div>

<div id="meses" style="display:flex;justify-content:space-between;margin-top:10px"></div>

<div class="timeline">

<div class="line"></div>

<div class="event install bottom" id="inst"></div>
<div class="label bottom" id="instLabel">Inst</div>

<div class="event invoice bottom" id="fact"></div>
<div class="label bottom" id="factLabel">Factura</div>

<div class="event pay top" id="pay">P</div>
<div class="label top" id="payLabel">Pago</div>

<div class="event charge top" id="charge">C</div>
<div class="label top" id="chargeLabel">Cargo</div>

</div>

<div class="result" id="info"></div>

</div>

<!-- AYUDA -->

<div class="modal" id="modalAyuda">
<div class="modal-content">
<div class="close" onclick="cerrarAyuda()">Cerrar ✖</div>

<img src="Imagenes/Diapositiva2.PNG">
<img src="Imagenes/Diapositiva3.PNG">
<img src="Imagenes/Diapositiva4.PNG">
<img src="Imagenes/Diapositiva5.PNG">
<img src="Imagenes/Diapositiva6.PNG">
<img src="Imagenes/Diapositiva7.PNG">

</div>
</div>

<script>

function simular(){

let fechaInput=document.getElementById("fecha").value;

if(!fechaInput){
alert("Ingrese fecha instalación");
return;
}

let fecha=new Date(fechaInput);

let dia=fecha.getDate();

let ciclos=[1,7,15,21];

let ciclo=ciclos.find(c=>c>dia);

let mesFactura=fecha.getMonth();

if(!ciclo){
ciclo=1;
mesFactura=mesFactura+1;
}

let mesActual=fecha.toLocaleString("es-ES",{month:"long"});
let mesSig=new Date(fecha.getFullYear(),fecha.getMonth()+1)
.toLocaleString("es-ES",{month:"long"});

document.getElementById("meses").innerHTML=
`<span>${mesActual}</span><span>${mesSig}</span>`;

let posInst=(dia/31)*100;
let posFact=(ciclo/31)*100;

setEvent("inst","instLabel",posInst,dia);
setEvent("fact","factLabel",posFact,ciclo);

let posPay=posFact+10;
let posCharge=posFact+20;

setEvent("pay","payLabel",posPay,"P");
setEvent("charge","chargeLabel",posCharge,"C");

let plan=parseFloat(document.getElementById("plan").value)||0;
let anticipo=parseFloat(document.getElementById("anticipo").value)||0;

let saldo=plan-anticipo;

document.getElementById("info").innerHTML=
`Ciclo asignado: ${ciclo}<br>
Prorrateo exonerado: ${dia} → ${ciclo}<br><br>
Saldo primera factura: ${saldo.toLocaleString()}`;

}

function setEvent(event,label,pos,text){

document.getElementById(event).style.left=pos+"%";
document.getElementById(label).style.left=pos+"%";
document.getElementById(event).innerHTML=text;

}

const pago=document.getElementById("pay");

pago.addEventListener("touchmove",move);
pago.addEventListener("mousemove",move);

function move(e){

let timeline=document.querySelector(".timeline");
let rect=timeline.getBoundingClientRect();

let x;

if(e.touches){
x=e.touches[0].clientX;
}else{
x=e.clientX;
}

let pos=(x-rect.left)/rect.width*100;

if(pos<0) pos=0;
if(pos>100) pos=100;

pago.style.left=pos+"%";
document.getElementById("payLabel").style.left=pos+"%";

check(pos);

}

function check(pos){

let charge=document.getElementById("charge").style.left.replace("%","");

let info=document.getElementById("info");

if(pos>charge){

info.innerHTML += "<br><span class='bad'>Genera cargo administrativo</span>";

}else{

info.innerHTML += "<br><span class='good'>Pago dentro del plazo</span>";

}

}

function limpiar(){

document.getElementById("fecha").value="";
document.getElementById("info").innerHTML="";
document.getElementById("meses").innerHTML="";

}

function abrirAyuda(){
document.getElementById("modalAyuda").style.display="flex";
}

function cerrarAyuda(){
document.getElementById("modalAyuda").style.display="none";
}

</script>

</body>
</html>
