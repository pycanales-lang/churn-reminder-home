<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador Facturación</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--tigo:#0033A0;
--tigo2:#0057D9;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0033A0,#0057D9);
color:white;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:20px;
font-weight:600;
}

.help{
width:36px;
height:36px;
background:white;
color:#0033A0;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.12);
padding:18px;
border-radius:16px;
margin-bottom:15px;
}

label{
font-size:12px;
opacity:0.85;
display:block;
margin-bottom:5px;
}

input{

width:100%;
height:48px;

padding:12px;

border-radius:12px;
border:none;

font-size:14px;

background:#f2f2f2;

}

.botones{
display:flex;
gap:10px;
margin-top:10px;
}

.botones button{
flex:1;
}

button{
padding:14px;
border:none;
border-radius:12px;
background:white;
color:#0033A0;
font-weight:600;
font-size:15px;
cursor:pointer;
}

.btn-clear{
background:#d9d9d9;
color:#333;
}

/* timeline */

.meses{
display:flex;
justify-content:space-between;
margin-top:10px;
font-weight:600;
}

.timeline{
position:relative;
height:160px;
margin-top:20px;
}

.line{
position:absolute;
top:50%;
width:100%;
height:4px;
background:white;
}

.event{
position:absolute;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.top{
top:40%;
transform:translate(-50%,-50%);
}

.bottom{
top:60%;
transform:translate(-50%,-50%);
}

.install{background:#4CC9F0;}
.invoice{background:#FFD166;color:black;}
.pay{background:#06D6A0;}
.charge{background:#EF476F;}

.label{
position:absolute;
font-size:12px;
width:90px;
text-align:center;
transform:translateX(-50%);
}

.label.top{ top:15%; }
.label.bottom{ top:75%; }

.result{
margin-top:20px;
font-size:15px;
}

.good{color:#06D6A0;}
.bad{color:#EF476F;}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

.modal-content{
background:white;
padding:15px;
border-radius:12px;
max-width:500px;
max-height:90%;
overflow:auto;
}

.modal-content img{
width:100%;
margin-bottom:12px;
border-radius:8px;
}

.close{
text-align:right;
font-weight:bold;
cursor:pointer;
color:black;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<div class="title">Simulador Facturación</div>
<div class="help" onclick="abrirAyuda()">?</div>
</div>

<div class="card">

<label>Fecha instalación</label>
<input type="date" id="fecha">

<label>Valor plan</label>
<input type="number" id="plan" value="180000">

<label>Anticipo</label>
<input type="number" id="anticipo" value="111000">

<div class="botones">
<button onclick="simular()">Simular</button>
<button class="btn-clear" onclick="limpiar()">Limpiar</button>
</div>

</div>

<div id="meses" class="meses"></div>

<div class="timeline">

<div class="line"></div>

<div class="event install bottom" id="inst"></div>
<div class="label bottom" id="instLabel">Inst</div>

<div class="event invoice bottom" id="fact"></div>
<div class="label bottom" id="factLabel">Factura</div>

<div class="event pay top" id="pay">P</div>
<div class="label top" id="payLabel">Pago</div>

<div class="event charge top" id="charge">C</div>
<div class="label top" id="chargeLabel">Cargo</div>

</div>

<div class="result" id="info"></div>

</div>

<!-- ayuda -->

<div class="modal" id="modalAyuda">

<div class="modal-content">

<div class="close" onclick="cerrarAyuda()">Cerrar ✖</div>

<img src="Imagenes/Diapositiva2.PNG">
<img src="Imagenes/Diapositiva3.PNG">
<img src="Imagenes/Diapositiva4.PNG">
<img src="Imagenes/Diapositiva5.PNG">
<img src="Imagenes/Diapositiva6.PNG">
<img src="Imagenes/Diapositiva7.PNG">

</div>

</div>

<script>

let cicloActual=0;
let diaInstalacion=0;
let saldoActual=0;

function simular(){

let fechaInput=document.getElementById("fecha").value;

if(!fechaInput){
alert("Ingrese fecha instalación");
return;
}

let fecha=new Date(fechaInput);

diaInstalacion=fecha.getDate();

let ciclos=[1,7,15,21];

cicloActual=ciclos.find(c=>c>diaInstalacion);

if(!cicloActual) cicloActual=1;

let mesActual=fecha.toLocaleString("es-ES",{month:"long"});
let mesSig=new Date(fecha.getFullYear(),fecha.getMonth()+1)
.toLocaleString("es-ES",{month:"long"});

document.getElementById("meses").innerHTML=
`<span>${mesActual}</span><span>${mesSig}</span>`;

let posInst=(diaInstalacion/31)*100;
let posFact=(cicloActual/31)*100;

setEvent("inst","instLabel",posInst,diaInstalacion);
setEvent("fact","factLabel",posFact,cicloActual);

let posPay=posFact+10;
let posCharge=posFact+20;

setEvent("pay","payLabel",posPay,"P");
setEvent("charge","chargeLabel",posCharge,"C");

let plan=parseFloat(document.getElementById("plan").value)||0;
let anticipo=parseFloat(document.getElementById("anticipo").value)||0;

saldoActual=plan-anticipo;

actualizarEstado("Pago dentro del plazo","good");

}

function setEvent(event,label,pos,text){

document.getElementById(event).style.left=pos+"%";
document.getElementById(label).style.left=pos+"%";
document.getElementById(event).innerHTML=text;

}

const pago=document.getElementById("pay");

pago.addEventListener("touchmove",move);
pago.addEventListener("mousemove",move);

function move(e){

let timeline=document.querySelector(".timeline");
let rect=timeline.getBoundingClientRect();

let x;

if(e.touches){
x=e.touches[0].clientX;
}else{
x=e.clientX;
}

let pos=(x-rect.left)/rect.width*100;

if(pos<0) pos=0;
if(pos>100) pos=100;

pago.style.left=pos+"%";
document.getElementById("payLabel").style.left=pos+"%";

check(pos);

}

function check(pos){

let cargoPos=parseFloat(
document.getElementById("charge").style.left
);

if(pos>cargoPos){

actualizarEstado("Genera cargo administrativo","bad");

}else{

actualizarEstado("Pago dentro del plazo","good");

}

}

function actualizarEstado(texto,clase){

document.getElementById("info").innerHTML=

`
Ciclo asignado: ${cicloActual}<br>
Prorrateo exonerado: ${diaInstalacion} → ${cicloActual}<br><br>

Saldo primera factura: ${saldoActual.toLocaleString()}<br>

<span class="${clase}">
${texto}
</span>
`;

}

function limpiar(){

document.getElementById("fecha").value="";
document.getElementById("info").innerHTML="";
document.getElementById("meses").innerHTML="";

}

function abrirAyuda(){
document.getElementById("modalAyuda").style.display="flex";
}

function cerrarAyuda(){
document.getElementById("modalAyuda").style.display="none";
}

</script>

</body>
</html>
