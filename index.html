<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn Calculator PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --tigo-blue:#0033A0;
    --tigo-light:#0057D9;
    --gradient:linear-gradient(135deg,#0033A0,#0057D9);
}

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:var(--gradient);
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

h1{
    font-size:20px;
}

.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:18px;
    margin-top:20px;
}

input,select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-bottom:10px;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:white;
    color:var(--tigo-blue);
    font-weight:600;
    font-size:15px;
    cursor:pointer;
}

.result{
    margin-top:15px;
}

.alert{
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    text-align:center;
    font-weight:600;
}

.low{background:#06D6A0;color:black;}
.medium{background:#FFD166;color:black;}
.high{background:#EF476F;}

.summary{
    font-size:13px;
    opacity:0.9;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Churn Calculator PRO</h1>

<div class="card">

<input type="text" id="cuenta" placeholder="Número de Cuenta">

<label>Fecha Activación</label>
<input type="date" id="fechaActivacion">

<label>Ciclo</label>
<select id="ciclo">
<option value="1">Ciclo 1</option>
<option value="7">Ciclo 7</option>
<option value="15">Ciclo 15</option>
<option value="21">Ciclo 21</option>
</select>

<input type="number" id="valorPlan" placeholder="Valor Plan (Gs)" value="180000">
<input type="number" id="anticipo" placeholder="Anticipo (Gs)" value="111000">
<input type="number" id="pagosRealizados" placeholder="Pagos Realizados (Gs)" value="0">

<button onclick="calcular()">Calcular Estado</button>

<div class="result" id="resultado"></div>

</div>

</div>

<script>

function calcular(){

let cuenta = document.getElementById("cuenta").value;
let fechaActivacion = new Date(document.getElementById("fechaActivacion").value);
let ciclo = parseInt(document.getElementById("ciclo").value);
let valorPlan = parseFloat(document.getElementById("valorPlan").value);
let anticipo = parseFloat(document.getElementById("anticipo").value);
let pagos = parseFloat(document.getElementById("pagosRealizados").value);

let hoy = new Date();

// Calcular próximo ciclo
let fechaCiclo = new Date(fechaActivacion);
fechaCiclo.setDate(ciclo);

if(fechaCiclo < fechaActivacion){
    fechaCiclo.setMonth(fechaCiclo.getMonth()+1);
}

// Dias mora
let diasMora = Math.floor((hoy - fechaCiclo) / (1000*60*60*24));
if(diasMora < 0) diasMora = 0;

// Saldo
let saldoPrimera = valorPlan - anticipo - pagos;
if(saldoPrimera < 0) saldoPrimera = 0;

let segundaFactura = valorPlan + saldoPrimera + 12000;

// Riesgo
let riesgoClase="";
let riesgoTexto="";

if(diasMora <= 3){
    riesgoClase="low";
    riesgoTexto="RIESGO BAJO";
}else if(diasMora <=10){
    riesgoClase="medium";
    riesgoTexto="RIESGO MEDIO";
}else{
    riesgoClase="high";
    riesgoTexto="RIESGO ALTO - Posible Churn";
}

document.getElementById("resultado").innerHTML=`

<div class="alert ${riesgoClase}">
${riesgoTexto}
</div>

<div class="summary">
Cuenta: <b>${cuenta}</b><br>
Días Mora: <b>${diasMora}</b><br>
Saldo Primera Factura: <b>Gs ${saldoPrimera.toLocaleString()}</b><br>
Si no paga → Segunda Factura: <b>Gs ${segundaFactura.toLocaleString()}</b>
</div>

`;

}

</script>

</body>
</html>
